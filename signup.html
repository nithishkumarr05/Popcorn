<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Popistry | Create Account — Artisanal Popcorn & Gourmet Snacks</title>
    <link rel="icon" href="assests/fav.png" type="image/jpeg">
    <meta name="description"
        content="Join the Popistry Crunch Club — create an account, enjoy exclusive member benefits, and track your gourmet snack orders.">
    <!-- Tailwind + Fonts + Icons -->
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Lato:wght@300;400;700;900&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontWeight: {
                        thin: '400',
                        extralight: '400',
                        light: '400',
                        normal: '400',
                        medium: '500',
                        semibold: '500',
                        bold: '550',
                        extrabold: '550',
                        black: '550',
                    },
                    colors: {
                        'popcorn-gold': '#6B8E23',
                        'popcorn-deep': '#D48A2A',
                        'popcorn-light': '#FDE6B6',

                        'warm-gray': '#FDF9F2'
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Lato"', 'system-ui', 'sans-serif'],
                    },
                    letterSpacing: {
                        'widest-xl': '0.3em',
                    }
                }

    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }

        /* Enhanced scrollbar */
        .hide-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .hide-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar-thumb {
            background: #6B8E23;
            border-radius: 10px;
        }

        .hide-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #6B8E23 transparent;
        }

        @keyframes slowZoom {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.08);
            }
        }

        .slow-zoom {
            animation: slowZoom 28s ease-in-out infinite alternate;
        }

        @keyframes floatPop {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-8px) rotate(3deg);
            }
        }

        .float-pop {
            animation: floatPop 6s ease-in-out infinite;
        }

        .btn-shine {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-shine:hover::after {
            left: 100%;
        }

        @keyframes toastFade {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

        .toast-animation {
            animation: toastFade 2.5s ease forwards;
        }

        /* RTL overrides */
        [dir="rtl"] .rtl\:right-auto {
            right: auto;
        }

        [dir="rtl"] .rtl\:left-0 {
            left: 0;
        }

        [dir="rtl"] .rtl\:rotate-180 {
            transform: rotate(180deg);
        }

        [dir="rtl"] .me-2 {
            margin-left: 0.5rem;
            margin-right: 0;
        }

        [dir="rtl"] .ms-2 {
            margin-right: 0.5rem;
            margin-left: 0;
        }

        /* Fix autofill */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #f9f9f9 inset !important;
        }

        .dark input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
            -webkit-text-fill-color: #e5e5e5 !important;
        }

        /* Glass card */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }

        .dark .glass-card {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(2px);
        }

        /* Animated border gradient */
        .animated-border {
            position: relative;
            background: linear-gradient(60deg, #6B8E23, #D48A2A, #6B8E23);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Extreme mobile optimization for 360px */
        @media (max-width: 400px) {

            .glass-card .p-6,
            .glass-card .p-8,
            .glass-card>div:last-child {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            .glass-card {
                border-radius: 1.5rem !important;
            }

            .glass-card .text-center.mb-6 {
                margin-bottom: 0.5rem !important;
            }

            .glass-card .flex.justify-center.gap-3 {
                margin-bottom: 0.5rem !important;
            }

            .glass-card form.space-y-5 {
                gap: 0.75rem !important;
            }

            .glass-card .mt-7 {
                margin-top: 0.5rem !important;
            }
        }

        @media (max-height: 850px) and (max-width: 400px) {
            .glass-card .text-center.mb-6 {
                margin-bottom: 0.25rem !important;
            }

            .glass-card .text-2xl {
                font-size: 1.25rem !important;
            }

            .social-login-btn {
                height: 2.25rem !important;
            }

            .glass-card input {
                padding-top: 0.4rem !important;
                padding-bottom: 0.4rem !important;
            }

            .glass-card button[type="submit"] {
                padding-top: 0.4rem !important;
                padding-bottom: 0.4rem !important;
            }

            .glass-card form {
                gap: 0.5rem !important;
            }

            .glass-card .mt-7 {
                margin-top: 0.25rem !important;
            }
        }

        body {
            overflow-x: hidden;
        }

        .w-screen {
            width: 100vw;
            overflow-x: hidden;
        }

        /* RTL text alignment */
        [dir="rtl"] input,
        [dir="rtl"] label,
        [dir="rtl"] button,
        [dir="rtl"] p,
        [dir="rtl"] h2 {
            text-align: right;
        }

        [dir="rtl"] .text-center {
            text-align: center;
        }

        [dir="rtl"] .me-2 {
            margin-left: 0.5rem;
            margin-right: 0;
        }

        [dir="rtl"] .ms-2 {
            margin-right: 0.5rem;
            margin-left: 0;
        }

        .max-h-[95dvh] {
            max-height: 95dvh;
        }

        [dir="rtl"] .rounded-l-2xl {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-top-right-radius: 1rem;
            border-bottom-right-radius: 1rem;
        }

        [dir="rtl"] .rounded-r-2xl {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            border-top-left-radius: 1rem;
            border-bottom-left-radius: 1rem;
        }

        button,
        a,
        [role="button"] {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        * {
            max-width: 100%;
            box-sizing: border-box;
        }

        /* Theme toggle icon visibility */
        .dark .fa-sun {
            display: none !important;
        }

        .dark .fa-moon {
            display: inline-block !important;
        }

        .fa-moon {
            display: none;
        }

        .fa-sun {
            display: inline-block;
        }
    </style>
</head>

    <!-- Toast Container -->
    <div id="toastContainer"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none w-auto max-w-[90vw]"></div>

    <script>
            (function () {
                // Toast helper
                function showToast(message, type = 'success') {
                    const container = document.getElementById('toastContainer');
                    if (!container) return;
                    const toast = document.createElement('div');
                    let bgColor = 'bg-emerald-600';
                    let icon = '<i class="fas fa-check-circle text-white text-sm"></i>';
                    if (type === 'error') { bgColor = 'bg-red-500'; icon = '<i class="fas fa-times-circle text-white text-sm"></i>'; }
                    else if (type === 'warning') { bgColor = 'bg-amber-500'; icon = '<i class="fas fa-exclamation-triangle text-white text-sm"></i>'; }
                    else if (type === 'info') { bgColor = 'bg-popcorn-gold'; icon = '<i class="fas fa-info-circle text-white text-sm"></i>'; }
                    toast.className = `toast-animation mb-2 px-5 py-3 rounded-xl shadow-lg text-xs sm:text-sm font-medium flex items-center gap-2 pointer-events-auto ${bgColor} text-white max-w-full`;
                    toast.innerHTML = `${icon} <span class="break-words">${message}</span>`;
                    container.appendChild(toast);
                    setTimeout(() => { if (toast && toast.remove) toast.remove(); }, 2600);
                }

                // Password visibility toggles
                function initPasswordToggles() {
                    document.querySelectorAll('.toggle-password').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const wrapper = btn.closest('.relative');
                            if (!wrapper) return;
                            const input = wrapper.querySelector('input');
                            const icon = btn.querySelector('i');
                            if (input.type === 'password') {
                                input.type = 'text';
                                if (icon) {
                                    icon.className = 'fas fa-eye';
                                }
                            } else {
                                input.type = 'password';
                                if (icon) {
                                    icon.className = 'fas fa-eye-slash';
                                }
                            }
                        });
                    });
                }

                // Theme toggle
                const themeToggle = document.getElementById('theme-toggle-signup');
                const htmlTag = document.documentElement;
                function updateThemeIcons() {
                    const isDark = htmlTag.classList.contains('dark');
                    const sunIcon = document.querySelector('#theme-toggle-signup .fa-sun');
                    const moonIcon = document.querySelector('#theme-toggle-signup .fa-moon');
                    if (sunIcon && moonIcon) {
                        if (isDark) {
                            sunIcon.classList.add('hidden');
                            moonIcon.classList.remove('hidden');
                        } else {
                            sunIcon.classList.remove('hidden');
                            moonIcon.classList.add('hidden');
                        }
                    }
                }
                function toggleTheme() {
                    if (htmlTag.classList.contains('dark')) {
                        htmlTag.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                        showToast('Light mode activated — enjoy!', 'info');
                    } else {
                        htmlTag.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                        showToast('Dark mode activated — cozy vibes', 'info');
                    }
                    updateThemeIcons();
                }
                if (themeToggle) themeToggle.addEventListener('click', toggleTheme);

                // Initialize theme
                if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    htmlTag.classList.add('dark');
                } else {
                    htmlTag.classList.remove('dark');
                }
                updateThemeIcons();

                // RTL Toggle
                const rtlToggle = document.getElementById('rtl-toggle-signup');
                function applyRTLStyles(isRtl) {
                    if (isRtl) {
                        htmlTag.setAttribute('dir', 'rtl');
                        localStorage.setItem('direction', 'rtl');
                    } else {
                        htmlTag.removeAttribute('dir');
                        localStorage.setItem('direction', 'ltr');
                    }
                }
                function toggleRTL() {
                    const currentDir = htmlTag.getAttribute('dir');
                    if (currentDir === 'rtl') {
                        applyRTLStyles(false);
                        showToast('LTR layout activated', 'info');
                    } else {
                        applyRTLStyles(true);
                        showToast('RTL layout for right-to-left languages', 'info');
                    }
                }
                if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
                if (localStorage.getItem('direction') === 'rtl') {
                    htmlTag.setAttribute('dir', 'rtl');
                } else if (localStorage.getItem('direction') === 'ltr') {
                    htmlTag.removeAttribute('dir');
                }

                // Social sign-up demo handlers
                const socialHandlers = {
                    google: 'Google', facebook: 'Facebook', apple: 'Apple'
                };
                Object.keys(socialHandlers).forEach(provider => {
                    const btn = document.getElementById(`${provider}Signup`);
                    if (btn) {
                        btn.addEventListener('click', () => {
                            showToast(`${socialHandlers[provider]} sign-up — coming soon! Use email to get 10% off.`, 'info');
                        });
                    }
                });

                // Form validation and account creation
                const signupForm = document.getElementById('signupForm');
                if (signupForm) {
                    signupForm.addEventListener('submit', (e) => {
                        e.preventDefault();

                        const fullname = document.getElementById('fullname').value.trim();
                        const email = document.getElementById('email').value.trim();
                        const password = document.getElementById('password').value;
                        const confirm = document.getElementById('confirmPassword').value;
                        const termsChecked = document.getElementById('termsCheckbox').checked;

                        if (!fullname || fullname.length < 2) {
                            return showToast('Please enter your full name', 'warning');
                        }
                        const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                        if (!emailPattern.test(email)) {
                            return showToast('Please enter a valid email address', 'error');
                        }
                        if (!password || password.length < 6) {
                            return showToast('Password must be at least 6 characters', 'warning');
                        }
                        if (password !== confirm) {
                            return showToast('Passwords do not match', 'error');
                        }
                        if (!termsChecked) {
                            return showToast('Please agree to the Terms of Service', 'warning');
                        }

                        const firstName = fullname.split(' ')[0] || "Snack Lover";
                        showToast(`🎉 Welcome ${firstName}! Check your email for 10% off your first order.`, 'success');
                    });
                }

                // Fix for keyboard open on mobile
                const mainCard = document.querySelector('main');
                if (mainCard) {
                    const inputs = mainCard.querySelectorAll('input');
                    inputs.forEach(inp => {
                        inp.addEventListener('focus', () => {
                            setTimeout(() => {
                                if (mainCard) {
                                    mainCard.scrollTo({ top: mainCard.scrollHeight, behavior: 'smooth' });
                                }
                            }, 200);
                        });
                    });
                }

                initPasswordToggles();
            })();
    </script>
</body>

</html>
